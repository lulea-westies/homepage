name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger from GitHub UI

# Default the whole workflow to read-only (least privilege)
permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Elevate only this job: pushing to the gh-pages branch needs write
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true # cancels outdated runs if you push again quickly

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for .GitInfo / .Lastmod

      # Required: the Congo theme is a Hugo Module fetched via Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # keeps CI in sync with go.mod (go 1.25.5)

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.162.1" # pinned for reproducible builds
          extended: true

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/hugo_cache
          key: ${{ runner.os }}-hugomod-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-hugomod-

      - name: Build
        # Project page is served under /homepage/, so override baseURL.
        # Remove this --baseURL flag once a custom domain is configured.
        # --cacheDir must match the path in the "Cache Hugo modules" step.
        run: hugo --gc --minify --baseURL "https://lulea-westies.github.io/homepage/" --cacheDir /home/runner/.cache/hugo_cache
        env:
          HUGO_ENVIRONMENT: production
          TZ: Europe/Stockholm # Luleå = Stockholm time

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
